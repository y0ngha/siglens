services:
    postgres:
        image: postgres:17
        environment:
            POSTGRES_USER: siglens
            POSTGRES_PASSWORD: siglens
            POSTGRES_DB: siglens_e2e
        ports: ['5433:5432']
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U siglens -d siglens_e2e']
            interval: 2s
            timeout: 3s
            retries: 30
    redis:
        image: redis:7
        ports: ['6380:6379']
        healthcheck:
            test: ['CMD', 'redis-cli', 'ping']
            interval: 2s
            timeout: 3s
            retries: 30
    srh:
        image: hiett/serverless-redis-http:latest
        environment:
            SRH_MODE: env
            SRH_TOKEN: e2e-token
            SRH_CONNECTION_STRING: 'redis://redis:6379'
        ports: ['8079:80']
        depends_on:
            redis:
                condition: service_healthy
