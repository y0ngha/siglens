name: Deploy

on:
    push:
        tags:
            - 'v*'
    # workflow_dispatch is intentionally omitted: the OIDC trust policy only allows
    # refs/tags/v*, so a manual dispatch from a branch would fail OIDC with a 403.
    # To redeploy, push a new tag or re-run a tag's completed workflow run.

# Never cancel an in-flight deploy: a partial rollout is worse than a queued one.
# If two tags race, the second waits until the first ASG refresh completes.
concurrency:
    group: deploy
    cancel-in-progress: false

permissions:
    # OIDC token exchange requires id-token: write
    id-token: write
    contents: read

jobs:
    # Fast pre-deploy gate: typecheck + unit tests only (NOT e2e — too slow for the
    # deploy hot path; e2e runs on PRs before the tag is ever cut). A tagged commit
    # that fails typecheck or unit tests must NOT reach the docker build / ASG roll.
    # `deploy` declares `needs: test-gate`, so a red gate blocks the rollout entirely.
    test-gate:
        runs-on: ubuntu-latest
        timeout-minutes: 15
        env:
            SIGLENS_GITHUB_TOKEN: ${{ secrets.SIGLENS_GITHUB_TOKEN }}
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

            - name: Enable Corepack
              run: corepack enable

            - uses: actions/setup-node@v4
              with:
                  node-version-file: .nvmrc
                  cache: yarn

            - name: Install dependencies
              run: yarn install --immutable

            - name: Type check
              run: yarn typecheck

            - name: Test (unit)
              run: yarn test

    deploy:
        needs: test-gate
        timeout-minutes: 30
        runs-on: ubuntu-24.04-arm
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

            # Derive the immutable image tag: strip the leading 'v' from the tag ref.
            # (v0.26.0 → 0.26.0)
            - name: Derive IMAGE_TAG
              run: |
                  IMAGE_TAG="${GITHUB_REF_NAME#v}"
                  echo "IMAGE_TAG=${IMAGE_TAG}" >> "$GITHUB_ENV"

            - name: Configure AWS credentials (OIDC)
              uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
              with:
                  role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
                  aws-region: ap-northeast-2

            - name: Login to Amazon ECR
              id: ecr
              uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

            # Build and push the Docker image.
            #
            # Tag strategy: push only the immutable version tag (e.g. :0.26.0).
            # We intentionally do NOT push :latest because:
            #   - user-data.sh pins an explicit tag, so :latest is never referenced at runtime.
            #   - The ECR lifecycle policy retains the last 3 tagged images; pushing :latest would
            #     cause every release to overwrite it and confuse the lifecycle count.
            #
            # Secrets are passed via BuildKit secret mounts so they never appear
            # in image layers or build logs (see Dockerfile RUN --mount=type=secret).
            # DATABASE_URL is needed at build time for ISR prerender of news/[category] + legal routes.
            # FMP_API_KEY is needed at build time for ISR prerender of /economy + /market (without it,
            # the snapshot/quote fetches fail and a degraded page is baked into the image until the
            # 24h revalidation re-renders it at runtime).
            #
            # NOTE: DATABASE_URL and FMP_API_KEY secrets must both be present in the repo's Actions
            # secrets before this workflow can succeed (required=true mounts). See: Settings → Secrets → Actions.
            #
            # Build pipeline (arm64-native, zero-downtime):
            #   1. Build for linux/arm64 with --load (image lands in runner's Docker daemon natively).
            #   2. Smoke-test: run /sbin/tini inside the arm64 image — catches exec-format errors
            #      before any push or ASG roll, so the running instance is never touched on a bad build.
            #   3. Push the validated image to ECR.
            #   4. Roll the ASG (deploy.sh) — which now waits for completion and exits non-zero on failure.
            - name: Build image (linux/arm64, load into runner)
              env:
                  SIGLENS_GITHUB_TOKEN: ${{ secrets.SIGLENS_GITHUB_TOKEN }}
                  DATABASE_URL: ${{ secrets.DATABASE_URL }}
                  # FMP_API_KEY: /economy·/market 빌드타임 prerender에 필요(없으면 degraded baked).
                  FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
              run: |
                  docker buildx build \
                      --platform linux/arm64 \
                      --provenance=false \
                      --secret id=SIGLENS_GITHUB_TOKEN,env=SIGLENS_GITHUB_TOKEN \
                      --secret id=DATABASE_URL,env=DATABASE_URL \
                      --secret id=FMP_API_KEY,env=FMP_API_KEY \
                      --build-arg NEXT_PUBLIC_SITE_URL=https://siglens.io \
                      --build-arg NEXT_PUBLIC_ADSENSE_PUBLISHER_ID=ca-pub-6121223912694381 \
                      --build-arg NEXT_PUBLIC_ADSENSE_SLOT_PROGRESS=2260139933 \
                      --build-arg NEXT_PUBLIC_ADSENSE_SLOT_PANEL_BOTTOM=5816241560 \
                      --build-arg NEXT_PUBLIC_ADSENSE_ENABLED=false \
                      `# GIT_SHA carries the release version (IMAGE_TAG), not a commit SHA. It is baked as buildId and used as the per-release S3 cache prefix (siglens-isr/<GIT_SHA>/...).` \
                      --build-arg GIT_SHA=${IMAGE_TAG} \
                      `# ⚠️ 버킷 이름은 infra/aws/12-isr-cache.sh, infra/aws/deploy.sh, .github/workflows/deploy.yml 3곳에서 동기화되어야 한다.` \
                      --build-arg ISR_CACHE_BUCKET=siglens-isr-cache \
                      --load \
                      -t ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-northeast-2.amazonaws.com/siglens:${IMAGE_TAG} \
                      .

            # Run the arm64 binary natively to confirm the entrypoint is the right architecture.
            # This is the exact check that would have caught the exec-format error
            # (linux/amd64 image deployed to a Graviton t4g.medium host).
            # On a native arm64 runner this is a real boot check with no emulation overhead.
            # Runs env-free so no runtime secrets are required here.
            - name: Smoke test image (arm64 boots)
              run: |
                  docker run --rm --platform linux/arm64 \
                      --entrypoint /sbin/tini \
                      ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-northeast-2.amazonaws.com/siglens:${IMAGE_TAG} \
                      -- node -e "console.log('arm64 boot ok')"

            - name: Push image to ECR
              run: |
                  docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-northeast-2.amazonaws.com/siglens:${IMAGE_TAG}

            # Roll the ASG by reusing the existing infra scripts.
            #
            # On the CI runner, infra/aws/.env and infra/aws/.ids are gitignored and absent.
            # We regenerate minimal equivalents here before calling deploy.sh.
            #
            # .env is written WITHOUT AWS_PROFILE: the OIDC credential chain populates
            # AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY / AWS_SESSION_TOKEN automatically
            # via configure-aws-credentials above. Setting AWS_PROFILE=siglens would
            # cause the AWS CLI to look for a named profile that doesn't exist on the runner
            # and fail immediately.
            #
            # EC2_SG is looked up by security-group name rather than hardcoding the ID,
            # because group IDs are mutable (can be recreated) while names are stable
            # by convention in this infra.
            - name: Regenerate infra env files for CI (no AWS_PROFILE)
              run: |
                  # Heredoc uses a tab-stripped form (<<-) so the closing EOF can be indented.
                  # The content lines must still start with a real tab for <<- stripping to work;
                  # here we write via printf to avoid any heredoc indentation ambiguity.
                  printf '%s\n' \
                      'export AWS_REGION=ap-northeast-2' \
                      'export APP=siglens' \
                      'export ECR_REPO=siglens' \
                      'export INSTANCE_TYPE=t4g.medium' \
                      'export EC2_ROLE=siglens-ec2-role' \
                      > infra/aws/.env

                  EC2_SG=$(aws ec2 describe-security-groups \
                      --filters Name=group-name,Values=siglens-ec2-sg \
                      --query 'SecurityGroups[0].GroupId' \
                      --output text)
                  printf 'export EC2_SG=%s\n' "${EC2_SG}" > infra/aws/.ids

            # PINNED_AMI (M1): the launch template uses a deliberately pinned AMI, not
            # "latest AL2023" resolved fresh each deploy. The pin lives in the repo
            # Actions *variable* vars.PINNED_AMI (Settings → Secrets and variables →
            # Actions → Variables). 05-launch-template.sh reads it from this env var.
            # Bump it deliberately (e.g. after 09-bake-ami.sh prints a new golden AMI ID).
            - name: Roll ASG via deploy.sh
              env:
                  PINNED_AMI: ${{ vars.PINNED_AMI }}
              run: bash infra/aws/deploy.sh "$IMAGE_TAG"

            - name: Log deployed tag
              run: echo "Deployed siglens:${IMAGE_TAG}; ASG instance refresh completed successfully."

            # Purge the Cloudflare cache after a successful deploy so the new build is served
            # immediately. Content-hashed /_next/static assets bust on their own, but cached
            # HTML pages would otherwise serve old markup (and reference old CSS) until the
            # s-maxage window expires — which is why a style change wasn't appearing without this.
            # continue-on-error: a purge hiccup (or a not-yet-configured token) must NOT mark an
            # already-completed rollout as failed.
            - name: Purge Cloudflare cache
              continue-on-error: true
              env:
                  CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
                  CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
              run: |
                  resp=$(curl -sS -X POST \
                    "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
                    -H "Authorization: Bearer ${CF_API_TOKEN}" \
                    -H "Content-Type: application/json" \
                    --data '{"purge_everything":true}')
                  echo "$resp"
                  if echo "$resp" | grep -q '"success":true'; then
                    echo "✅ Cloudflare cache purged"
                  else
                    echo "⚠️ Cloudflare purge failed — verify CF_API_TOKEN secret (Zone:Cache Purge) and CF_ZONE_ID"
                    exit 1
                  fi
