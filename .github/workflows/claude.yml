name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))

    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          show_full_output: true
          claude_args: --dangerously-skip-permissions
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          base_branch: master
          additional_permissions: |
            actions: read
          prompt: |
            ## 컨텍스트 정보 (GitHub Actions 주입값 — 신뢰할 것)

            레포지토리: ${{ github.repository }}
            이벤트 타입: ${{ github.event_name }}
            이슈 번호: ${{ github.event.issue.number }}
            PR 번호: ${{ github.event.pull_request.number }}
            사용자 요청: "${{ github.event.comment.body || github.event.review.body || github.event.issue.body }}"

            ## 시작 전 필독

            AGENTS.md와 docs/*.md 문서를 반드시 먼저 읽고 프로젝트 규칙을 숙지한 뒤 작업한다.
            프로젝트 규칙은 AGENTS.md에 모두 정의되어 있다.

            ## 컨텍스트 파악 절차 (가장 먼저 실행)

            issue_comment / issues 이벤트:
              gh issue view ${{ github.event.issue.number }} --repo ${{ github.repository }}

            pull_request_review_comment / pull_request_review 이벤트:
              gh pr view ${{ github.event.pull_request.number }} --repo ${{ github.repository }}

            번호가 0이거나 파악 안 되면:
              gh issue list --repo ${{ github.repository }} --limit 10
              gh pr list --repo ${{ github.repository }} --limit 10

            ## 작업 상태 코멘트 규칙

            시작 / 완료 / 실패 시 반드시 gh 명령어로 코멘트를 남긴다.

            이슈 컨텍스트:
              gh issue comment ${{ github.event.issue.number }} --repo ${{ github.repository }} --body "🔨 작업을 시작합니다."
              gh issue comment ${{ github.event.issue.number }} --repo ${{ github.repository }} --body "✅ 작업이 완료됐습니다. PR을 확인해주세요: {PR URL}"
              gh issue comment ${{ github.event.issue.number }} --repo ${{ github.repository }} --body "❌ 작업이 실패했습니다. 사유: {실패 원인}"

            PR 컨텍스트:
              gh pr comment ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --body "🔨 작업을 시작합니다."
              gh pr comment ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --body "✅ 작업이 완료됐습니다."
              gh pr comment ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --body "❌ 작업이 실패했습니다. 사유: {실패 원인}"

            ## 작업 절차

            코드 구현 전 반드시 아래 판단을 먼저 한다.

            gh pr view ${{ github.event.issue.number }} --repo ${{ github.repository }} 실행
            - 성공 → PR 컨텍스트 (수정 요청)
            - 실패 → 이슈 컨텍스트 (신규 구현)

            ### PR 컨텍스트 — 새 브랜치/PR 생성 금지, 헤드 브랜치에 직접 작업

            1. 헤드 브랜치 체크아웃
               gh pr view ${{ github.event.issue.number }} --json headRefName --repo ${{ github.repository }}
               git fetch origin {헤드 브랜치명} && git checkout {헤드 브랜치명}
            2. 수정 + 테스트
            3. yarn lint → yarn test → yarn build (모두 통과 필수)
            4. git push origin {헤드 브랜치명}
               기존 PR에 완료 코멘트 작성

            ### 이슈 컨텍스트 — 새 브랜치 생성 후 PR 오픈

            1. git checkout master && git pull origin master
               git checkout -b {type}/#{이슈번호}/{이슈 한줄 요약}
               타입: feat, fix, chore, style, refactor, test, docs
            2. 구현 + 테스트
            3. yarn lint → yarn test → yarn build (모두 통과 필수, 실패 시 수정 후 재실행)
            4. gh pr create — 제목: {type}: {이슈 제목}
               본문: closes #{이슈번호} + 명령어 실행 결과 + Summary + 파일 목록

      - name: Post failure comment if Claude fails
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ github.event.issue.number || github.event.pull_request.number }} --repo ${{ github.repository }} --body "❌ 시스템 에러 또는 API 한도 초과로 Claude 작업을 시작하지 못했습니다."