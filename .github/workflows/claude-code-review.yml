name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          show_full_output: true
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)" --dangerously-skip-permissions
          allowed_bots: "claude[bot]"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            /code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}

            아래 Siglens 프로젝트 규칙을 기준으로 추가 리뷰해줘.
            코드 문제가 있으면 mcp__github_inline_comment__create_inline_comment로 인라인 코멘트를 달아줘.
            지적할 문제가 3개 이상이면 gh pr comment로 전체 요약도 달아줘.
            리뷰할 내용이 없으면 리뷰할 내용이 없다고 달아줘.

            ## 프로젝트 개요
            - 미국 주식 AI 분석 플랫폼 (분석 전용, 주문 없음)
            - Next.js 16.2 (App Router + Turbopack), React 19.2, TypeScript
            - Layered Architecture: domain / infrastructure / app / components

            ## 레이어 의존성 규칙 (위반 시 반드시 지적)
            - domain/: 외부 라이브러리 import 금지. 순수 TypeScript 함수만.
            - infrastructure/: domain만 import 가능.
            - components/: domain만 import 가능. infrastructure 직접 import 금지.
            - app/: infrastructure, domain 모두 import 가능.

            ## 도메인 규칙
            - 인디케이터 초기 구간(period 미만)은 반드시 null 반환 (0, NaN 금지)
            - 도메인 함수는 순수 함수여야 함 (fetch, console.log, Date.now() 등 사이드 이펙트 금지)
            - 도메인 함수 반환 타입 명시 필수
            
            ## 상세 규칙
            - docs/ARCHITECTURE.md: 레이어 구조, 폴더 구조, 데이터 흐름
            - docs/DOMAIN.md: 인디케이터 계산 명세, 타입 정의
            - docs/API.md: Alpaca API, 내부 Route 명세
            - docs/CONVENTIONS.md: 네이밍, 코딩 규칙, 자주 하는 실수
            - docs/FF.md: FF 4원칙 (Readability, Predictability, Cohesion, Coupling)
            - docs/DESIGN.md: 컬러 시스템, MA/EMA 라인 스타일, 차트 컬러 상수
            - docs/GIT_CONVENTION.md: 브랜치 네이밍, 커밋 메시지, PR 규칙
            
            ## 디자인 규칙 (docs/DESIGN.md 참고)
            - 컬러는 반드시 CHART_COLORS 상수 또는 Tailwind 토큰 사용 (하드코딩 금지)
            - MA는 실선(lineStyle: 0), EMA는 점선(lineStyle: 1)
            - MA/EMA 기간별 색상: 5=#ef4444, 10=#f97316, 20=#eab308, 60=#22c55e, 120=#3b82f6, 200=#a855f7
            - 상승=#26a69a, 하락=#ef5350 고정 (임의 변경 금지)
            - 다크 모드 전용 (라이트 모드 분기 불필요)

            ## 코딩 패러다임 (위반 시 반드시 지적)
            - for/while 루프 → map, filter, reduce로 대체됐는지 확인
            - let 재할당 → const로 선언됐는지 확인
            - 원본 배열/객체 직접 변경 → spread 연산자 사용 여부 확인
            - 조건 중첩/삼항 중첩 → 객체 맵 또는 얼리 리턴으로 대체됐는지 확인
            - domain/에서 클래스 사용 → 순수 함수로 대체됐는지 확인

            ## 코드 품질
            - any 타입 사용 금지
            - Props는 inline type 금지, 별도 interface로 정의
            - 컴포넌트는 named export (page/layout만 default export)
            - 'use client' 누락 여부 확인 (useState, useEffect 사용 시 필수)
            - 타임프레임은 URL 쿼리 파라미터가 아닌 클라이언트 상태로 관리

            ## Lightweight Charts
            - components/chart/ 밖에서 import 금지
            - useEffect cleanup에서 chart.remove() 호출 여부 확인
            - 실시간 업데이트는 setData가 아닌 series.update() 사용
            - 거래량, RSI 등 별도 pane(index 1, 2...)에 배치 여부 확인

            ## FF 원칙 (docs/FF.md 참고)
            - Readability: 동시에 실행되지 않는 코드 분리, 복잡한 조건에 이름 부여, 매직 넘버 상수화, 중첩 삼항 금지
            - Predictability: 같은 계열 함수 반환 타입 통일, 이름 중복 금지, 숨은 로직 드러내기
            - Cohesion: 함께 수정되는 파일은 같은 디렉토리, 관련 상수 한 곳에서 관리
            - Coupling: 단일 책임, 섣부른 추상화 금지 (3회 반복 후 추상화), Props Drilling 제거
            - 레이어별 우선순위: domain=Predictability, components=Readability, infrastructure=Cohesion

            ## 테스트
            - domain/, infrastructure/ 구현 파일에 대응하는 테스트 파일 누락 여부 확인
            - 테스트 구조: describe → describe(context) → it
            - 커버리지 100% 목표이므로 엣지 케이스 테스트 누락 지적