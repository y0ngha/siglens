name: Claude Code Review

on:
    pull_request:
        types: [opened, synchronize, ready_for_review, reopened]

jobs:
    claude-review:
        runs-on: ubuntu-latest
        concurrency:
            group: claude-review-${{ github.event.pull_request.number }}
            cancel-in-progress: true
        permissions:
            contents: read
            pull-requests: write
            id-token: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 1

            - name: Run Claude Code Review
              id: claude-review
              uses: anthropics/claude-code-action@v1
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  show_full_output: true
                  claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
                  base_branch: master
                  prompt: |
                      REPO: ${{ github.repository }}
                      PR NUMBER: ${{ github.event.pull_request.number }}

                      ## Output Language

                      All review comments, inline comments, and PR comment bodies must be written in Korean.
                      Do not use English in any user-facing output.

                      ## Excluded Directories

                      Skip the following directories during code review:
                        /docs/
                        /refs/
                        /.github/
                        /.yarn/
                        /public/

                      ## Review Procedure

                      1. Run: gh pr comment ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --body "🔍 리뷰를 진행 중입니다."
                      2. Check changed code: gh pr diff ${{ github.event.pull_request.number }} --repo ${{ github.repository }}
                      3. Load project principle documents (see section below)
                      4. Review the diff against all loaded rules
                      5. If findings exist, leave inline comments via gh api, then submit a summary comment via gh pr comment with REQUEST_CHANGES status
                      6. If no issues, approve with the command below and omit the comment
                      ```bash
                      gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews \
                      --method POST \
                      -f body="LGTM 👍" \
                      -f event="APPROVE"
                      ```

                      ## Project Principle Documents (read all before reviewing)

                      These documents define the authoritative rules for this project.
                      Do not rely on general knowledge — always derive review criteria from these files.

                      1. Read AGENTS.md — project overview, layer dependency rules, agent system
                      2. Read /docs/MISTAKES.md — common mistakes to flag (highest priority, read carefully)
                      3. Read /docs/CONVENTIONS.md — coding conventions, naming, paradigm rules
                      4. Read /docs/FF.md — frontend principles (Readability, Predictability, Cohesion, Coupling)
                      5. Read /docs/ARCHITECTURE.md — layer structure, folder layout, dependency directions
                      6. Read /docs/DOMAIN.md — indicator specs, domain rules, IndicatorResult structure
                      7. Read /docs/DESIGN.md — color system, chart color constants
                      8. Reference other /docs/*.md files as needed based on the scope of the diff

                      ## Review Focus Areas

                      After reading the documents above, verify the following categories.
                      The detailed rules for each are defined in the docs — do not apply rules from memory.

                      - **Layer dependencies** — import direction violations (see ARCHITECTURE.md)
                      - **Domain rules** — purity, null handling, return types, IndicatorResult structure (see DOMAIN.md)
                      - **Coding paradigm** — FP conventions, immutability, no for/while (see CONVENTIONS.md)
                      - **TypeScript** — no any, explicit return types, no inline prop types (see CONVENTIONS.md)
                      - **Components** — use client, named exports, timeframe state management (see CONVENTIONS.md)
                      - **Design** — color tokens, chart line styles, fixed semantic colors (see DESIGN.md)
                      - **Lightweight Charts** — usage scope, cleanup, update method (see CONVENTIONS.md)
                      - **Tests** — coverage, null initial period cases, test structure (see CONVENTIONS.md)
                      - **FF principles** — readability, predictability, cohesion, coupling (see FF.md)
                      - **Common mistakes** — all patterns listed in MISTAKES.md

                      ## Test Environment Note

                      If jest.setup.ts exists, do not flag missing environment variables as a bug.
                      All test environment variables are set globally in jest.setup.ts.

            - name: Post failure comment if review fails
              if: failure()
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  gh pr comment ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --body "❌ 시스템 에러 또는 API 한도 초과로 코드 리뷰를 시작하지 못했습니다."